<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" id="favicon" type="image/svg+xml" href="/favicon-light.svg">
  <script>
    (function () {
      var mq = window.matchMedia('(prefers-color-scheme: dark)');
      function apply() {
        document.getElementById('favicon').href = mq.matches ? '/favicon-dark.svg' : '/favicon-light.svg';
      }
      apply();
      mq.addEventListener ? mq.addEventListener('change', apply) : mq.addListener(apply);
    })();
  </script>
  <title>container detail — nucleus</title>
  <style>
    :root { color-scheme: light dark; --bg: #0d1117; --fg: #e6edf3; --muted: #7d8590; --accent: #2f81f7; --card: #161b22; --ok: #3fb950; --down: #f85149; }
    @media (prefers-color-scheme: light) { :root { --bg: #f6f8fa; --fg: #1f2328; --muted: #59636e; --card: #ffffff; --accent: #0969da; --ok: #1a7f37; --down: #cf222e; } }
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 1100px; margin: 0 auto; padding: 1.5rem; background: var(--bg); color: var(--fg); }
    a.back { color: var(--accent); text-decoration: none; font-size: 0.85rem; }
    header { display: flex; align-items: center; gap: 0.55rem; margin: 0.5rem 0 1rem 0; flex-wrap: wrap; }
    header .logo { color: var(--accent); flex-shrink: 0; display: inline-flex; }
    h1 { margin: 0; font-size: 1.3rem; }
    h2 { font-size: 0.85rem; text-transform: uppercase; color: var(--muted); margin: 1.5rem 0 0.5rem 0; letter-spacing: 0.05em; }
    .pill { background: var(--card); padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.8rem; color: var(--muted); }
    .pill.ok { color: var(--ok); }
    .pill.down { color: var(--down); }
    .card { background: var(--card); padding: 0.8rem 1rem; border-radius: 8px; }
    .grid { display: grid; grid-template-columns: max-content 1fr; gap: 0.3rem 1rem; font-size: 0.85rem; }
    .grid .k { color: var(--muted); }
    table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; }
    th, td { padding: 0.4rem 0.7rem; text-align: left; font-size: 0.82rem; border-bottom: 1px solid var(--bg); font-family: ui-monospace, monospace; }
    th { background: var(--bg); font-weight: 600; color: var(--muted); text-transform: uppercase; font-size: 0.7rem; font-family: inherit; }
    tr:last-child td { border-bottom: none; }
    pre.logs { background: var(--card); padding: 0.8rem; border-radius: 8px; font-size: 0.75rem; overflow-x: auto; max-height: 25rem; white-space: pre-wrap; word-break: break-all; }
    .ports-row { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .port { background: var(--card); padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.8rem; font-family: ui-monospace, monospace; }
  </style>
</head>
<body>
  <a href="/" class="back">← dashboard</a>
  <header>
    <span class="logo"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12 L 6 12 L 8.5 7 L 12 17 L 14 12 L 17 12 L 19 9 L 22 12"/></svg></span>
    <h1 id="name">loading…</h1>
    <span class="pill" id="state"></span>
    <span class="pill" id="image"></span>
  </header>

  <h2>overview</h2>
  <div class="card">
    <div class="grid" id="overview"></div>
  </div>

  <h2>ports</h2>
  <div class="ports-row" id="ports"></div>

  <h2>processes (docker top)</h2>
  <div id="processes"></div>

  <h2>recent logs (last 50 lines)</h2>
  <pre class="logs" id="logs"></pre>

  <script>
    const id = location.pathname.split('/').pop();
    function escapeHTML(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    async function refresh() {
      const res = await fetch('/api/containers/' + id);
      const d = await res.json();
      if (d.error) {
        document.getElementById('name').textContent = 'not found';
        document.getElementById('overview').innerHTML = `<div class="k">error</div><div>${escapeHTML(d.error)}</div>`;
        return;
      }
      document.getElementById('name').textContent = d.name;
      document.getElementById('image').textContent = d.image;
      const stateEl = document.getElementById('state');
      stateEl.textContent = d.state;
      stateEl.className = 'pill ' + (d.state === 'running' ? 'ok' : 'down');

      document.getElementById('overview').innerHTML = `
        <div class="k">id</div><div><code>${escapeHTML(d.id)}</code></div>
        <div class="k">created</div><div>${escapeHTML(d.created || '—')}</div>
        <div class="k">started</div><div>${escapeHTML(d.started_at || '—')}</div>
        ${d.status ? `<div class="k">status note</div><div>${escapeHTML(d.status)}</div>` : ''}
      `;

      document.getElementById('ports').innerHTML = d.ports.length === 0
        ? `<span class="port">none exposed</span>`
        : d.ports.map(p => `<span class="port">${escapeHTML(p.container_port)}/${escapeHTML(p.protocol)}${p.host_port ? ' → :' + escapeHTML(p.host_port) : ''}</span>`).join('');

      document.getElementById('processes').innerHTML = d.processes.length === 0
        ? `<div class="card"><div class="grid"><div class="k">processes</div><div>none reported (or container stopped)</div></div></div>`
        : `<table><thead><tr><th>user</th><th>pid</th><th>cmd</th></tr></thead><tbody>
            ${d.processes.map(p => `<tr><td>${escapeHTML(p.user)}</td><td>${escapeHTML(p.pid)}</td><td>${escapeHTML(p.cmd)}</td></tr>`).join('')}
          </tbody></table>`;

      document.getElementById('logs').textContent = d.recent_logs || '(no logs)';
    }
    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
