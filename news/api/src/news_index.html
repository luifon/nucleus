<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" id="favicon" type="image/svg+xml" href="/favicon-light.svg">
<script>
  (function () {
    var mq = window.matchMedia('(prefers-color-scheme: dark)');
    function apply() {
      document.getElementById('favicon').href = mq.matches ? '/favicon-dark.svg' : '/favicon-light.svg';
    }
    apply();
    mq.addEventListener ? mq.addEventListener('change', apply) : mq.addListener(apply);
  })();
</script>
<title>nucleus / news</title>
<style>
  :root {
    --bg: #0a0a0a;
    --bg-elev: #111111;
    --bg-deep: #050505;
    --fg: #e8e6df;
    --muted: #6c6a63;
    --dim: #3a3833;
    --border: #2a2823;

    --amber: #ffb95c;
    --amber-dark-text: #0a0a0a;
    --phosphor: #a3d977;
    --cyan: #7dd9cc;
    --red: #e26d6d;

    --muted-amber: #6b4d1f;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font-family: 'JetBrains Mono', 'Berkeley Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px; line-height: 1.55;
  }
  a { color: var(--amber); text-decoration: none; }
  a:hover { color: var(--fg); }

  .wrap {
    max-width: 1180px;
    margin: 0 auto;
    padding: 1.4rem 1.5rem 3rem;
  }

  /* ===== page header ===== */
  .page-head {
    display: flex; justify-content: space-between; align-items: baseline;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0.55rem; margin-bottom: 0.7rem;
  }
  .brand { font-weight: 700; letter-spacing: 0.04em; }
  .brand .accent { color: var(--amber); }
  .meta { color: var(--muted); font-size: 11px; }
  .meta .accent { color: var(--amber); }

  .nav {
    color: var(--muted); font-size: 11px;
    margin-bottom: 1.2rem;
    display: flex; gap: 1.2rem; flex-wrap: wrap;
  }
  .nav a { color: var(--muted); }
  .nav a:hover { color: var(--amber); }

  /* ===== filter row ===== */
  .filter {
    display: flex; flex-wrap: wrap; align-items: center;
    gap: 0.7rem 1rem;
    padding: 0.6rem 0.8rem;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    margin-bottom: 1.6rem;
    font-size: 12px;
  }
  .filter label { display: inline-flex; align-items: center; gap: 0.4rem; color: var(--muted); }
  .filter input[type="date"], .filter input[type="number"] {
    background: var(--bg-deep); color: var(--fg); border: 1px solid var(--border);
    padding: 0.3rem 0.45rem; font: inherit; font-size: 12px; color-scheme: dark;
  }
  .filter input:focus { outline: none; border-color: var(--amber); }
  .filter input[type="number"] { width: 4.5rem; }
  .filter input[type="checkbox"] {
    appearance: none; width: 14px; height: 14px;
    background: var(--bg-deep); border: 1px solid var(--muted-amber);
    cursor: pointer; position: relative; margin: 0;
  }
  .filter input[type="checkbox"]:checked { background: var(--amber); border-color: var(--amber); }
  .filter input[type="checkbox"]:checked::after {
    content: ''; position: absolute; left: 3px; top: 0;
    width: 4px; height: 8px;
    border: solid var(--amber-dark-text); border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  .filter .refresh {
    margin-left: auto;
    background: var(--amber); color: var(--amber-dark-text);
    border: 0; font: inherit; font-size: 12px; font-weight: 600;
    padding: 0.35rem 0.9rem; cursor: pointer; letter-spacing: 0.06em;
  }
  .filter .refresh:hover { filter: brightness(1.08); }

  /* ===== LEAD STORY — full-width hero ===== */
  .lead {
    background: var(--bg-elev);
    padding: 1.4rem 1.6rem 1.2rem;
    margin-bottom: 1.8rem;
    box-shadow: 0 0 0 3px var(--bg), 0 0 0 5px var(--amber);
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto auto auto;
    gap: 0.4rem 1.5rem;
    align-items: start;
  }
  .lead .kicker {
    grid-column: 1 / -1;
    font-size: 10px; letter-spacing: 0.25em;
    color: var(--amber); text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .lead .title {
    grid-column: 1;
    margin: 0;
    font-size: 1.55rem; font-weight: 600;
    line-height: 1.2;
    letter-spacing: -0.005em;
  }
  .lead .title a { color: var(--fg); }
  .lead .title a:hover { color: var(--amber); }
  .lead .votes {
    grid-column: 2;
    grid-row: 2;
    display: flex; gap: 0.35rem;
  }
  .lead .summary {
    grid-column: 1 / -1;
    color: var(--muted);
    font-size: 13.5px;
    line-height: 1.55;
    margin: 0.2rem 0 0;
    max-width: 80ch;
  }
  .lead .meta-row {
    grid-column: 1 / -1;
    display: flex; flex-wrap: wrap; gap: 0.6rem 1.1rem;
    font-size: 11px; color: var(--muted);
    margin-top: 0.45rem;
    align-items: center;
  }

  /* ===== SECTION RULES ===== */
  .section { }
  .section + .section { margin-top: 2rem; }
  .section.hidden { display: none; }
  .section-rule {
    display: flex; align-items: center; gap: 0.8rem;
    color: var(--muted); font-size: 10.5px;
    letter-spacing: 0.2em; text-transform: uppercase;
    margin: 0 0 0.9rem;
  }
  .section-rule.notable { color: var(--amber); }
  .section-rule .count {
    color: var(--dim); font-weight: 400;
    letter-spacing: 0.1em;
  }
  .section-rule.notable .count { color: var(--amber); opacity: 0.65; }
  .section-rule::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .section-rule.notable::after { background: var(--muted-amber); }

  /* ===== SECONDARY GRID + CARDS ===== */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 1.5rem 1.4rem;
  }
  .card {
    background: var(--bg-elev);
    padding: 0.85rem 1rem 0.7rem;
    box-shadow: 0 0 0 3px var(--bg), 0 0 0 5px var(--muted-amber);
    display: flex; flex-direction: column;
  }
  .card.notable {
    box-shadow: 0 0 0 3px var(--bg), 0 0 0 5px var(--amber);
  }
  .card .title-row {
    display: flex; align-items: baseline; gap: 0.55rem;
    margin-bottom: 0.3rem;
  }
  .card .notable-tag {
    font-size: 9.5px; letter-spacing: 0.18em;
    color: var(--amber); text-transform: uppercase;
    padding-top: 0.15rem;
    flex: 0 0 auto;
  }
  .card .title {
    margin: 0;
    font-size: 1rem; font-weight: 500;
    line-height: 1.35;
    flex: 1;
  }
  .card .title a { color: var(--fg); }
  .card .title a:hover { color: var(--amber); }
  .card .summary {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.5;
    margin: 0.25rem 0 0.5rem;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card .meta-row {
    margin-top: auto;
    padding-top: 0.4rem;
    display: flex; flex-wrap: wrap; gap: 0.4rem 0.8rem;
    align-items: center;
    font-size: 11px; color: var(--muted);
  }
  .card .meta-row .src { color: var(--phosphor); }
  .card .meta-row .score { color: var(--muted); }
  .card.notable .meta-row .score { color: var(--amber); }
  .card .votes { margin-left: auto; display: flex; gap: 0.3rem; }

  /* ===== shared vote button ===== */
  .vote {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); padding: 0.12rem 0.45rem;
    font: inherit; font-size: 11px; cursor: pointer; letter-spacing: 0.04em;
  }
  .vote:hover { color: var(--fg); border-color: var(--muted); }
  .vote.cast { background: var(--amber); border-color: var(--amber); color: var(--amber-dark-text); }
  .vote:disabled { opacity: 0.5; cursor: wait; }

  .empty {
    color: var(--muted);
    padding: 2rem 1rem;
    text-align: center;
    font-style: italic;
    grid-column: 1 / -1;
  }

  /* "↗ original" chip — small amber pill that links to article_url */
  .chip {
    display: inline-flex; align-items: center; gap: 0.25rem;
    padding: 0.05rem 0.45rem;
    border: 1px solid var(--muted-amber);
    color: var(--amber);
    font-size: 10.5px;
    letter-spacing: 0.04em;
    cursor: pointer;
    text-decoration: none;
  }
  .chip:hover { background: var(--amber); color: var(--amber-dark-text); border-color: var(--amber); }
  .chip.discussion { color: var(--cyan); border-color: #3a5a55; }
  .chip.discussion:hover { background: var(--cyan); color: var(--amber-dark-text); border-color: var(--cyan); }

  /* Make cards click-to-open-modal, but keep nested links working */
  .card { cursor: pointer; transition: filter 0.08s; }
  .card:hover { filter: brightness(1.08); }

  /* ===== modal ===== */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.7);
    display: none;
    z-index: 50;
    align-items: flex-start; justify-content: center;
    overflow-y: auto;
    padding: 4rem 1.5rem 4rem;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--bg-elev);
    box-shadow: 0 0 0 3px var(--bg), 0 0 0 5px var(--amber);
    max-width: 760px; width: 100%;
    padding: 1.5rem 1.7rem 1.3rem;
    position: relative;
    color: var(--fg);
  }
  .modal .close {
    position: absolute; top: 0.65rem; right: 0.85rem;
    background: transparent; border: 0;
    color: var(--muted);
    font: inherit; font-size: 14px;
    cursor: pointer;
    padding: 0.2rem 0.4rem;
  }
  .modal .close:hover { color: var(--amber); }
  .modal .kicker {
    font-size: 10px; letter-spacing: 0.25em;
    color: var(--amber); text-transform: uppercase;
    margin-bottom: 0.55rem;
  }
  .modal .title {
    margin: 0 1.5rem 0.5rem 0;
    font-size: 1.4rem; font-weight: 600;
    line-height: 1.25;
    letter-spacing: -0.005em;
  }
  .modal .title a { color: var(--fg); }
  .modal .title a:hover { color: var(--amber); }
  .modal .meta {
    display: flex; flex-wrap: wrap; gap: 0.45rem 0.9rem;
    font-size: 11px; color: var(--muted);
    margin-bottom: 0.95rem;
    align-items: center;
  }
  .modal .meta .src { color: var(--phosphor); }
  .modal .meta .score { color: var(--amber); }
  .modal .summary {
    color: var(--ink, var(--fg));
    font-size: 13.5px;
    line-height: 1.6;
    white-space: pre-wrap;
    margin: 0 0 1rem;
  }
  .modal .reason {
    color: var(--cyan); font-style: italic;
    font-size: 12.5px;
    border-left: 1px solid #3a5a55;
    padding: 0.15rem 0 0.15rem 0.7rem;
    margin: 0 0 1rem;
  }
  .modal .links {
    display: flex; flex-wrap: wrap; gap: 0.5rem;
    margin: 0 0 1rem;
  }
  .modal .footer {
    display: flex; align-items: center; gap: 0.7rem;
    padding-top: 0.8rem;
    border-top: 1px solid var(--border);
  }
  .modal .footer .votes { display: flex; gap: 0.4rem; }
  @media (max-width: 540px) {
    .modal-backdrop { padding: 2rem 0.8rem; }
    .modal { padding: 1.1rem 1.1rem 0.9rem; }
    .modal .title { font-size: 1.15rem; }
  }

  @media (max-width: 760px) {
    .lead { grid-template-columns: 1fr; padding: 1rem 1.1rem; }
    .lead .title { font-size: 1.25rem; }
    .lead .votes { grid-column: 1; grid-row: 4; margin-top: 0.6rem; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="page-head">
      <div class="brand">[<span class="accent">nucleus</span>] / news</div>
      <div class="meta" id="meta">▸ loading…</div>
    </div>
    <nav class="nav">
      <a href="{{DASHBOARD_URL}}" target="_blank" rel="noopener" style="display: {{DASHBOARD_LINK_DISPLAY}}">← dashboard</a>
      <a href="{{CHAT_URL}}" target="_blank" rel="noopener" style="display: {{CHAT_LINK_DISPLAY}}">chat →</a>
    </nav>

    <div class="filter">
      <label>fetch day <input type="date" id="day"></label>
      <label>min score <input type="number" id="min" value="0" min="0" max="1" step="0.1"></label>
      <label><input type="checkbox" id="notable-only"> notable only</label>
      <button class="refresh" id="refresh">refresh</button>
    </div>

    <article class="lead" id="lead" style="display:none"></article>

    <section class="section hidden" id="sec-notable">
      <div class="section-rule notable">◆ notable <span class="count" id="notable-count"></span></div>
      <div class="grid" id="grid-notable"></div>
    </section>

    <section class="section hidden" id="sec-other">
      <div class="section-rule">other stories <span class="count" id="other-count"></span></div>
      <div class="grid" id="grid-other"></div>
    </section>

    <div id="empty-state"></div>
  </div>

  <!-- Modal lives at the document root so it's not clipped by .wrap's max-width -->
  <div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" aria-hidden="true">
    <article class="modal" id="modal"></article>
  </div>

<script>
const $ = q => document.querySelector(q);
const escapeHTML = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const day = $('#day');
const min = $('#min');
const notableOnly = $('#notable-only');
day.value = new Date().toISOString().slice(0, 10);

// Items keyed by id — populated by refresh(), consumed by openModal().
const itemsById = new Map();

async function vote(itemId, v, btn) {
  if (btn.disabled) return;
  btn.disabled = true;
  try {
    const res = await fetch('/api/vote', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ item_id: itemId, vote: v }),
    });
    if (res.ok) btn.classList.add('cast');
  } finally {
    btn.disabled = false;
  }
}

function cardHTML(i) {
  const notable = (i.notable_score ?? 0) >= 0.6;
  const score = i.notable_score != null ? i.notable_score.toFixed(2) : '–';
  const articleChip = i.article_url
    ? `<a class="chip" href="${escapeHTML(i.article_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">↗ article</a>`
    : '';
  return `
    <article class="card ${notable ? 'notable' : ''}" data-id="${escapeHTML(i.id)}">
      <div class="title-row">
        ${notable ? '<span class="notable-tag">notable</span>' : ''}
        <h3 class="title"><a href="${escapeHTML(i.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${escapeHTML(i.title)}</a></h3>
      </div>
      <p class="summary">${escapeHTML(i.summary || '')}</p>
      <div class="meta-row">
        <span>pub ${escapeHTML(i.published_date)}</span>
        ${i.source_name ? `<span class="src">${escapeHTML(i.source_name)}</span>` : ''}
        <span class="score">${escapeHTML(score)}</span>
        ${articleChip}
        <div class="votes">
          <button class="vote" onclick="event.stopPropagation(); vote('${escapeHTML(i.id)}', 1, this)">▲ ${i.upvotes || 0}</button>
          <button class="vote" onclick="event.stopPropagation(); vote('${escapeHTML(i.id)}', -1, this)">▼ ${i.downvotes || 0}</button>
        </div>
      </div>
    </article>
  `;
}

function leadHTML(i) {
  const score = i.notable_score != null ? i.notable_score.toFixed(2) : '–';
  return `
    <div class="kicker">◆ top story · score ${escapeHTML(score)}</div>
    <h2 class="title"><a href="${escapeHTML(i.url)}" target="_blank" rel="noopener">${escapeHTML(i.title)}</a></h2>
    <div class="votes">
      <button class="vote" onclick="vote('${escapeHTML(i.id)}', 1, this)">▲ ${i.upvotes || 0}</button>
      <button class="vote" onclick="vote('${escapeHTML(i.id)}', -1, this)">▼ ${i.downvotes || 0}</button>
    </div>
    <p class="summary">${escapeHTML(i.summary || '')}</p>
    <div class="meta-row">
      <span>pub ${escapeHTML(i.published_date)}</span>
      ${i.source_name ? `<span style="color: var(--phosphor)">${escapeHTML(i.source_name)}</span>` : ''}
      ${i.notable_reason ? `<span style="color: var(--cyan); font-style: italic;">${escapeHTML(i.notable_reason)}</span>` : ''}
    </div>
  `;
}

async function refresh() {
  const path = notableOnly.checked ? '/api/items/notable' : '/api/items';
  const url = `${path}?fetch_date=${day.value}&min_score=${min.value}`;
  const res = await fetch(url);
  const items = await res.json();

  // Server returns score desc, but defend against ordering surprises.
  items.sort((a, b) => (b.notable_score ?? 0) - (a.notable_score ?? 0));

  // Rebuild the modal lookup map.
  itemsById.clear();
  for (const it of items) itemsById.set(it.id, it);

  const lead = $('#lead');
  const secNotable = $('#sec-notable');
  const secOther = $('#sec-other');
  const empty = $('#empty-state');

  $('#meta').innerHTML = `▸ updated ${new Date().toLocaleTimeString('en-GB')} · <span class="accent">${items.length}</span> items in fetch day ${day.value}`;

  if (!items.length) {
    lead.style.display = 'none';
    secNotable.classList.add('hidden');
    secOther.classList.add('hidden');
    empty.innerHTML = '<div class="empty">no items for this day</div>';
    return;
  }
  empty.innerHTML = '';

  // Hero = highest-scored item.
  const [hero, ...rest] = items;
  lead.style.display = '';
  lead.innerHTML = leadHTML(hero);

  // Split remaining into notable (≥0.6) and other (<0.6).
  const notable = rest.filter(i => (i.notable_score ?? 0) >= 0.6);
  const other = rest.filter(i => (i.notable_score ?? 0) < 0.6);

  $('#notable-count').textContent = notable.length ? `· ${notable.length}` : '';
  $('#other-count').textContent = other.length ? `· ${other.length}` : '';

  if (notable.length) {
    secNotable.classList.remove('hidden');
    $('#grid-notable').innerHTML = notable.map(cardHTML).join('');
  } else {
    secNotable.classList.add('hidden');
  }
  if (other.length) {
    secOther.classList.remove('hidden');
    $('#grid-other').innerHTML = other.map(cardHTML).join('');
  } else {
    secOther.classList.add('hidden');
  }
}

$('#refresh').addEventListener('click', refresh);
day.addEventListener('change', refresh);
min.addEventListener('change', refresh);
notableOnly.addEventListener('change', refresh);

// ===== modal =====
function openModal(id) {
  const i = itemsById.get(id);
  if (!i) return;
  const notable = (i.notable_score ?? 0) >= 0.6;
  const score = i.notable_score != null ? i.notable_score.toFixed(2) : '–';
  const links = [];
  links.push(`<a class="chip discussion" href="${escapeHTML(i.url)}" target="_blank" rel="noopener">↗ ${escapeHTML(i.source_name || 'discussion')}</a>`);
  if (i.article_url) {
    links.push(`<a class="chip" href="${escapeHTML(i.article_url)}" target="_blank" rel="noopener">↗ original article</a>`);
  }
  $('#modal').innerHTML = `
    <button class="close" aria-label="close">✕</button>
    ${notable ? '<div class="kicker">◆ notable</div>' : ''}
    <h2 class="title"><a href="${escapeHTML(i.url)}" target="_blank" rel="noopener">${escapeHTML(i.title)}</a></h2>
    <div class="meta">
      <span>pub ${escapeHTML(i.published_date)}</span>
      ${i.source_name ? `<span class="src">${escapeHTML(i.source_name)}</span>` : ''}
      <span class="score">score ${escapeHTML(score)}</span>
    </div>
    ${i.notable_reason ? `<div class="reason">${escapeHTML(i.notable_reason)}</div>` : ''}
    <div class="summary">${escapeHTML(i.summary || '(no summary)')}</div>
    <div class="links">${links.join('')}</div>
    <div class="footer">
      <div class="votes">
        <button class="vote" onclick="vote('${escapeHTML(i.id)}', 1, this)">▲ ${i.upvotes || 0}</button>
        <button class="vote" onclick="vote('${escapeHTML(i.id)}', -1, this)">▼ ${i.downvotes || 0}</button>
      </div>
    </div>
  `;
  $('#modal-backdrop').classList.add('open');
  $('#modal-backdrop').setAttribute('aria-hidden', 'false');
  $('#modal .close').addEventListener('click', closeModal);
}
function closeModal() {
  $('#modal-backdrop').classList.remove('open');
  $('#modal-backdrop').setAttribute('aria-hidden', 'true');
}
$('#modal-backdrop').addEventListener('click', (e) => {
  if (e.target.id === 'modal-backdrop') closeModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// Global card-click delegate. Stops on nested anchors / buttons (they
// stop propagation themselves) and otherwise opens the modal.
document.addEventListener('click', (e) => {
  const card = e.target.closest('.card');
  if (!card) return;
  const id = card.dataset.id;
  if (id) openModal(id);
});

refresh();
</script>
</body>
</html>
