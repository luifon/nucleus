<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" id="favicon" type="image/svg+xml" href="/favicon-light.svg">
<script>
  (function () {
    var mq = window.matchMedia('(prefers-color-scheme: dark)');
    function apply() {
      document.getElementById('favicon').href = mq.matches ? '/favicon-dark.svg' : '/favicon-light.svg';
    }
    apply();
    mq.addEventListener ? mq.addEventListener('change', apply) : mq.addListener(apply);
  })();
</script>
<title>nucleus / chat</title>
<!-- marked.js renders assistant markdown. Pinned to a major so a silent
     upgrade doesn't break message rendering. User messages stay literal. -->
<script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --bg-elev: #111111;
    --bg-deep: #050505;
    --fg: #e8e6df;
    --muted: #6c6a63;
    --dim: #3a3833;
    --border: #2a2823;

    --amber: #ffb95c;
    --amber-bg: #ffb95c;
    --amber-dark-text: #0a0a0a;
    --phosphor: #a3d977;
    --cyan: #7dd9cc;
    --red: #e26d6d;

    --user-active-bg: #2a1f0f;
    --ok-bg: #1c2614;
    --ok-border: #4d6b34;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); height: 100%; overflow: hidden; }
  body {
    font-family: 'JetBrains Mono', 'Berkeley Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px; line-height: 1.55;
    display: grid;
    grid-template-columns: 280px 1fr;
  }
  a { color: var(--amber); text-decoration: none; }

  /* ===== sidebar ===== */
  aside {
    border-right: 1px solid var(--border);
    background: var(--bg-elev);
    display: flex; flex-direction: column;
    min-height: 0;
  }
  .side-head {
    padding: 0.75rem 0.85rem 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .brand { font-weight: 700; letter-spacing: 0.04em; font-size: 13px; }
  .brand .accent { color: var(--amber); }
  .back-link { font-size: 11px; color: var(--muted); display: block; margin-top: 0.25rem; }
  .back-link:hover { color: var(--amber); }

  .side-actions { padding: 0.85rem 0.7rem 0.95rem; }
  .new-btn {
    width: 100%;
    background: var(--amber);
    border: 0;
    color: var(--amber-dark-text);
    font: inherit; font-size: 12px; font-weight: 600;
    padding: 0.55rem 0.5rem; cursor: pointer;
    letter-spacing: 0.06em;
    /* match the active-card halo so the button reads as the same primary
       visual unit as the chat tiles below it */
    box-shadow: 0 0 0 3px var(--bg-elev), 0 0 0 5px var(--amber);
  }
  .new-btn:hover { filter: brightness(1.08); }
  .new-btn:disabled { opacity: 0.5; cursor: wait; }

  .chat-list { flex: 1; min-height: 0; overflow-y: auto; padding: 0.7rem; }
  .chat-list::-webkit-scrollbar { width: 8px; }
  .chat-list::-webkit-scrollbar-thumb { background: var(--border); }

  .chat-tile {
    border: 0;
    padding: 0.4rem 0.55rem;
    margin-bottom: 1.15rem;
    cursor: pointer;
    position: relative;
    background: var(--bg-elev);
    /* halo: 3px gap from the tile, then a 2px muted amber ring */
    box-shadow: 0 0 0 3px var(--bg-elev), 0 0 0 5px #6b4d1f;
  }
  .chat-tile:hover {
    background: var(--bg-deep);
    box-shadow: 0 0 0 3px var(--bg-elev), 0 0 0 5px var(--amber);
  }
  .chat-tile.active {
    background: var(--amber);
    box-shadow: 0 0 0 3px var(--bg-elev), 0 0 0 5px var(--amber);
  }
  .chat-tile .when {
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .chat-tile.active .when { color: var(--amber-dark-text); opacity: 0.75; }
  .chat-tile .title {
    font-size: 13px; color: var(--fg); font-weight: 500;
    margin-top: 0.15rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .chat-tile.active .title { color: var(--amber-dark-text); font-weight: 600; }
  .chat-tile .meta {
    font-size: 10px; color: var(--dim);
    letter-spacing: 0.05em;
    margin-top: 0.2rem;
  }
  .chat-tile.active .meta { color: var(--amber-dark-text); opacity: 0.6; }
  .chat-tile .del {
    position: absolute; top: 0.45rem; right: 0.5rem;
    background: none; border: none; color: var(--muted);
    font: inherit; font-size: 11px; cursor: pointer;
    padding: 0; opacity: 0; transition: opacity 0.1s;
  }
  .chat-tile:hover .del { opacity: 1; }
  .chat-tile .del:hover { color: var(--red); }
  .chat-tile.active .del { color: var(--amber-dark-text); opacity: 0.7; }
  .chat-tile.active .del:hover { color: #c11; opacity: 1; }
  .chat-list .empty-list {
    color: var(--muted); font-size: 12px;
    text-align: center; padding: 1.2rem 0.5rem;
  }

  /* ===== main ===== */
  main {
    display: flex; flex-direction: column;
    min-height: 0; overflow: hidden;
    padding: 0.5rem 0.6rem 0.8rem;
  }
  .chat-head {
    border-bottom: 1px solid var(--border);
    padding: 0.55rem 0.9rem;
    display: flex; align-items: center; gap: 0.6rem;
    flex: 0 0 auto;
    background: var(--bg-elev);
  }
  .chat-head .title {
    color: var(--fg); font-weight: 600;
    font-size: 14px;
    flex: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .chat-head .ts {
    color: var(--muted); font-size: 11px;
    letter-spacing: 0.06em;
  }
  .chat-head .ts .accent { color: var(--amber); }

  .messages {
    flex: 1; min-height: 0;
    overflow-y: auto;
    padding: 1.2rem 1.6rem;
    display: flex; flex-direction: column; gap: 1.1rem;
  }
  .messages::-webkit-scrollbar { width: 8px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); }
  .messages::-webkit-scrollbar-thumb:hover { background: var(--dim); }

  /* ===== user message — bright amber "stamp", right-aligned ===== */
  .msg.user {
    align-self: flex-end;
    max-width: 68%;
    background: var(--amber);
    color: var(--amber-dark-text);
    padding: 0.65rem 0.85rem;
    white-space: pre-wrap;
    font-weight: 500;
    line-height: 1.5;
  }
  .msg.user .role { display: none; }
  .msg.user a { color: var(--amber-dark-text); text-decoration: underline; }

  /* ===== assistant — full-width content, no bubble, sigil header ===== */
  .msg.assistant {
    align-self: stretch;
    max-width: 100%;
    background: transparent;
    color: var(--fg);
    padding: 0;
    border: 0;
  }
  .msg.assistant .role {
    display: inline-flex;
    align-items: baseline;
    gap: 0.5rem;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--phosphor);
    font-weight: 600;
    padding-bottom: 0.3rem;
    border-bottom: 1px solid var(--ok-border);
    margin-bottom: 0.65rem;
    padding-right: 1rem;
  }
  .msg.assistant .role::before { content: '◆'; color: var(--phosphor); }
  .msg.assistant p { margin: 0.4rem 0; }
  .msg.assistant p:first-child { margin-top: 0; }
  .msg.assistant p:last-child { margin-bottom: 0; }
  .msg.assistant ul, .msg.assistant ol { margin: 0.45rem 0; padding-left: 1.25rem; }
  .msg.assistant li { margin: 0.15rem 0; }
  .msg.assistant code {
    background: var(--bg-elev);
    color: var(--cyan);
    padding: 0.06rem 0.32rem;
    font-size: 0.9em;
  }
  .msg.assistant pre {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    padding: 0.6rem 0.8rem;
    overflow-x: auto;
    margin: 0.5rem 0;
  }
  .msg.assistant pre code {
    background: transparent; padding: 0;
    color: var(--fg); font-size: 0.9em;
    line-height: 1.5;
  }
  .msg.assistant a { color: var(--amber); }
  .msg.assistant blockquote {
    border-left: 2px solid var(--ok-border);
    padding: 0.1rem 0 0.1rem 0.7rem;
    margin: 0.5rem 0;
    color: var(--muted);
  }
  .msg.assistant table { border-collapse: collapse; margin: 0.5rem 0; font-size: 0.92em; }
  .msg.assistant th, .msg.assistant td { border: 1px solid var(--border); padding: 0.3rem 0.6rem; text-align: left; }
  .msg.assistant th { background: var(--bg-elev); }

  /* empty state when no chat selected */
  .messages .placeholder {
    margin: auto;
    color: var(--muted);
    text-align: center;
    font-size: 13px;
    line-height: 1.7;
  }
  .messages .placeholder .hint {
    color: var(--dim); font-size: 11px;
    letter-spacing: 0.06em; margin-top: 0.4rem;
  }

  /* ===== input ===== */
  .input-row {
    border-top: 1px solid var(--border);
    padding: 0.6rem 0.9rem 0.7rem;
    display: flex; gap: 0.5rem; align-items: stretch;
    flex: 0 0 auto;
    background: var(--bg-elev);
  }
  .input-row textarea {
    flex: 1;
    background: var(--bg-deep);
    color: var(--fg);
    border: 1px solid var(--border);
    font: inherit; font-size: 13px;
    padding: 0.5rem 0.6rem;
    resize: none; min-height: 2.4rem; max-height: 8rem;
    line-height: 1.4;
  }
  .input-row textarea:focus { outline: none; border-color: var(--amber); }
  .input-row textarea:disabled { opacity: 0.6; }
  .input-row button {
    background: var(--amber);
    border: 0;
    color: var(--amber-dark-text);
    font: inherit; font-size: 12px; font-weight: 600;
    padding: 0 1.1rem; cursor: pointer;
    letter-spacing: 0.08em;
  }
  .input-row button:hover { filter: brightness(1.08); }
  .input-row button:disabled { opacity: 0.4; cursor: wait; }

  /* mobile drawer */
  @media (max-width: 760px) {
    body { grid-template-columns: 1fr; }
    aside { display: none; }
    aside.open {
      display: flex;
      position: fixed; inset: 0 auto 0 0;
      width: 84vw; max-width: 300px;
      z-index: 10;
      background: var(--bg-elev);
      box-shadow: 4px 0 16px rgba(0,0,0,0.5);
    }
    .menu-btn { display: inline-block !important; }
    .messages { padding: 1rem; }
    .msg.user { max-width: 84%; }
  }
  .menu-btn {
    display: none;
    background: var(--bg-deep); border: 1px solid var(--border); color: var(--muted);
    font: inherit; font-size: 14px; padding: 0.25rem 0.55rem; cursor: pointer;
  }
  .menu-btn:hover { color: var(--amber); border-color: var(--amber); }
</style>
</head>
<body>
  <aside id="aside">
    <div class="side-head">
      <div class="brand">[<span class="accent">nucleus</span>] / chats</div>
      <a href="{{DASHBOARD_URL}}" class="back-link" style="display: {{DASHBOARD_LINK_DISPLAY}}">← dashboard</a>
    </div>
    <div class="side-actions">
      <button class="new-btn" id="new-chat">+ new chat</button>
    </div>
    <div class="chat-list" id="chat-list"></div>
  </aside>
  <main>
    <div class="chat-head">
      <button class="menu-btn" onclick="document.getElementById('aside').classList.toggle('open')">≡</button>
      <span class="title" id="chat-title">select a chat or create one</span>
      <span class="ts" id="chat-meta"></span>
    </div>
    <div class="messages" id="messages">
      <div class="placeholder">
        vault: ~/Documents/Obsidian
        <div class="hint">ask anything against it</div>
      </div>
    </div>
    <div class="input-row">
      <textarea id="input" placeholder="ask something… (cmd/ctrl+enter to send)" disabled></textarea>
      <button id="send" disabled>send</button>
    </div>
  </main>

<script>
const $ = q => document.querySelector(q);
const $$ = q => Array.from(document.querySelectorAll(q));
const escapeHTML = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
marked.setOptions({ gfm: true, breaks: true });

const list = $('#chat-list');
const titleEl = $('#chat-title');
const metaEl = $('#chat-meta');
const messagesEl = $('#messages');
const input = $('#input');
const sendBtn = $('#send');
const newBtn = $('#new-chat');

let activeChatId = null;
let chats = [];

function relTime(iso) {
  if (!iso) return '';
  const t = new Date(iso).getTime();
  const delta = Math.floor((Date.now() - t) / 1000);
  if (delta < 60) return delta + 's ago';
  if (delta < 3600) return Math.floor(delta / 60) + 'm ago';
  if (delta < 86400) return Math.floor(delta / 3600) + 'h ago';
  if (delta < 86400 * 7) return Math.floor(delta / 86400) + 'd ago';
  return Math.floor(delta / (86400 * 7)) + 'w ago';
}

function renderMessageHTML(role, content) {
  const inner = role === 'assistant' ? marked.parse(String(content ?? '')) : escapeHTML(content);
  return `<div class="msg ${role}"><div class="role">ai</div>${inner}</div>`;
}

function renderChatList() {
  if (!chats.length) {
    list.innerHTML = '<div class="empty-list">no chats yet · click <b>+ new chat</b></div>';
    return;
  }
  list.innerHTML = chats.map(c => `
    <div class="chat-tile ${c.id === activeChatId ? 'active' : ''}" data-id="${c.id}">
      <button class="del" data-id="${c.id}" title="delete">✕</button>
      <div class="when">${escapeHTML(relTime(c.last_active))}</div>
      <div class="title">${escapeHTML(c.title || 'new chat')}</div>
      <div class="meta">${c.claude_session_id ? 'session ' + c.claude_session_id.slice(0, 8) : 'no session yet'}</div>
    </div>
  `).join('');
  list.querySelectorAll('.chat-tile').forEach(el => {
    el.onclick = (e) => {
      if (e.target.classList.contains('del')) return;
      openChat(el.dataset.id);
    };
  });
  list.querySelectorAll('.del').forEach(b => {
    b.onclick = async (e) => {
      e.stopPropagation();
      if (!confirm('delete this chat?')) return;
      await fetch('/api/chats/' + b.dataset.id, { method: 'DELETE' });
      if (b.dataset.id === activeChatId) {
        activeChatId = null;
        messagesEl.innerHTML = '<div class="placeholder">select or create a chat</div>';
        titleEl.textContent = 'select a chat or create one';
        metaEl.textContent = '';
        input.disabled = true;
        sendBtn.disabled = true;
      }
      await loadChats();
    };
  });
}

async function loadChats() {
  const res = await fetch('/api/chats');
  chats = await res.json();
  renderChatList();
}

async function openChat(id) {
  activeChatId = id;
  const res = await fetch('/api/chats/' + id);
  if (!res.ok) {
    titleEl.textContent = 'chat not found';
    return;
  }
  const detail = await res.json();
  titleEl.textContent = detail.chat.title || 'new chat';
  metaEl.innerHTML = detail.chat.claude_session_id
    ? `session <span class="accent">${escapeHTML(detail.chat.claude_session_id.slice(0, 8))}</span> · ${detail.messages.length} msgs`
    : 'no session yet';
  messagesEl.innerHTML = detail.messages.length === 0
    ? '<div class="placeholder">no messages yet — say something</div>'
    : detail.messages.map(m => renderMessageHTML(m.role, m.content)).join('');
  messagesEl.scrollTop = messagesEl.scrollHeight;
  input.disabled = false;
  sendBtn.disabled = false;
  input.focus();
  renderChatList();
}

async function newChat() {
  newBtn.disabled = true;
  try {
    const res = await fetch('/api/chats', { method: 'POST' });
    const c = await res.json();
    await loadChats();
    openChat(c.id);
  } finally {
    newBtn.disabled = false;
  }
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || !activeChatId) return;
  input.disabled = true;
  sendBtn.disabled = true;
  input.value = '';
  messagesEl.insertAdjacentHTML('beforeend', renderMessageHTML('user', text));
  messagesEl.insertAdjacentHTML(
    'beforeend',
    `<div class="msg assistant" id="thinking"><div class="role">ai</div><em style="color: var(--muted)">thinking…</em></div>`
  );
  messagesEl.scrollTop = messagesEl.scrollHeight;
  try {
    const res = await fetch('/api/chats/' + activeChatId + '/messages', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    const data = await res.json();
    const thinking = document.getElementById('thinking');
    if (data.error) {
      thinking.innerHTML = `<div class="role">ai</div><span style="color: var(--red)">error: ${escapeHTML(data.error)}</span>`;
    } else {
      thinking.removeAttribute('id');
      thinking.innerHTML = `<div class="role">ai</div>${marked.parse(String(data.assistant_message.content ?? ''))}`;
      if (data.chat_title) {
        titleEl.textContent = data.chat_title;
        await loadChats();
      }
      if (data.session_id) {
        // Recompute the message count from DOM to keep meta in sync without an extra fetch.
        const msgCount = messagesEl.querySelectorAll('.msg').length;
        metaEl.innerHTML = `session <span class="accent">${escapeHTML(data.session_id.slice(0, 8))}</span> · ${msgCount} msgs`;
      }
    }
  } catch (e) {
    const thinking = document.getElementById('thinking');
    if (thinking) thinking.innerHTML = `<div class="role">ai</div><span style="color: var(--red)">network error: ${escapeHTML(e.message)}</span>`;
  }
  input.disabled = false;
  sendBtn.disabled = false;
  messagesEl.scrollTop = messagesEl.scrollHeight;
  input.focus();
}

newBtn.onclick = newChat;
sendBtn.onclick = sendMessage;
input.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') sendMessage();
});

(async function init() {
  await loadChats();
  if (chats.length > 0) {
    await openChat(chats[0].id);
  }
})();
</script>
</body>
</html>
