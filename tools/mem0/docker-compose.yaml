name: nucleus-mem0

# Tier 4 / mem0 wiring is deferred indefinitely (see ADR-001 slice S4).
# mem0 needs an embedding model AND an LLM provider, neither of which is
# covered by the Claude Max subscription that powers the rest of Nucleus.
# T3 = PARA-organized Obsidian vault is the second-brain layer instead.
#
# This compose file is kept for the future — if we ever revisit, it boots
# with the existing volumes (preserved across the project rename from
# `hermes-mem0` via the `external: true` declarations below).
#
# Usage if/when we revisit:
#   cd ~/Development/nucleus/tools/mem0
#   docker compose up -d
# Then wire an embedding/LLM provider (Ollama-local, or accept the API
# spend). Until then: leave the stack stopped.

services:
  postgres:
    image: ankane/pgvector:v0.5.1
    container_name: nucleus-mem0-postgres
    restart: on-failure
    shm_size: "128mb"
    environment:
      - POSTGRES_USER=mem0
      - POSTGRES_PASSWORD=mem0_local
      - POSTGRES_DB=mem0
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "mem0", "-U", "mem0"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_db:/var/lib/postgresql/data
    ports:
      - "8432:5432"
    networks:
      - mem0_network

  neo4j:
    image: neo4j:5.26.4
    container_name: nucleus-mem0-neo4j
    restart: on-failure
    networks:
      - mem0_network
    healthcheck:
      test: wget http://localhost:7687 || exit 1
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 30s
    ports:
      - "8474:7474"
      - "8687:7687"
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_AUTH=none

  mem0-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nucleus-mem0-api
    restart: on-failure
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mem0
      - POSTGRES_USER=mem0
      - POSTGRES_PASSWORD=mem0_local
      - OPENAI_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_BASE_URL=https://openrouter.ai/api/v1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=none
      - HISTORY_DB_PATH=/tmp/mem0_history.db
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - mem0_network
    command: uvicorn main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_db:
    external: true
    name: hermes-mem0_postgres_db
  neo4j_data:
    external: true
    name: hermes-mem0_neo4j_data

networks:
  mem0_network:
    driver: bridge
